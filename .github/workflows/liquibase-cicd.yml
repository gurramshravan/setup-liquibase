name: Basic Usage
on: [push, pull_request]

jobs:
  test-sql:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: my_test_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Connect and Run Query
        run: mysql -h 127.0.0.1 -u root -proot_password -e "SHOW DATABASES;"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: liquibase/setup-liquibase@v2
        with:
          version: '5.0.1'
          edition: 'community'
      
      - name: Download MySQL JDBC Driver
        run: |
          mkdir -p drivers
          curl -L -o drivers/mysql-connector-j.jar \
          https://repo1.maven.org/maven2/mysql/mysql-connector-java/8.0.33/mysql-connector-java-8.0.33.jar

      - name: Verify Driver File
        run: |
          ls -l drivers
          
      - name: Run Liquibase Update
        run: |
          liquibase update \
            --changelog-file=changelog.xml \
            --url=jdbc:mysql://127.0.0.1:3306/my_test_db \
            --username=root \
            --password=root_password \
            --driver=com.mysql.cj.jdbc.Driver \
            --classpath=drivers/mysql-connector-j.jar \
            --log-level=debug
